{% extends 'homeapp/base.html' %}

{% block title %}Entrar - EcucApp{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark text-light shadow-lg">
                <div class="card-body p-4">
                    <h2 class="card-title mb-4 text-center">Login do Aluno</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuário</label>
                            <input type="text" class="form-control bg-secondary text-light" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Senha</label>
                            <input type="password" class="form-control bg-secondary text-light" id="password" name="password" required>
                        </div>
                        <!--<button type="submit" class="btn btn-primary w-100">Entrar</button>-->
                        <a href="{% url 'aluno' %}" class="btn btn-primary w-100">Entrar</a>
                    </form>
{% endblock %}
